<!DOCTYPE html>
<html>
<head>
    <title>Seymour Forum</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: #2f3136;
            margin: 0;
            padding: 0 15px;
            color: #e6e6e6;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #36393f;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 70%;
            max-width: 400px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #e6e6e6;
            margin-bottom: 8px;
        }

        button {
            background: #5865F2;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }

        .search-entry, .inbox-entry {
            background: #2f3136;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        #chatMessages {
            background: #202225;
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #202225;
        }

        .msg-line { margin-bottom: 5px; border-bottom: 1px solid #2f3136; padding-bottom: 2px; }
        .msg-user { color: #5865F2; font-weight: bold; }

        hr { margin: 20px 0; border: 1px solid #202225; }
    </style>
</head>
<body>

<div class="container">

<h2>Login</h2>
<div id="loginSection">
    <input id="usernameInput" placeholder="Username">
    <input id="passwordInput" type="password" placeholder="Password">
    <br>
    <button onclick="submitLogin()">Login</button>
    <button onclick="switchToCreate()">Create Account</button>
    <p id="errorMsg" style="color:#ed4245;"></p>
</div>

<div id="appSection" style="display:none;">

<hr>

<h3>Create New Thread</h3>
<input id="threadTitle" placeholder="Thread Title (e.g. Trading Items)">
<select id="categorySelect">
    <option value="">(Optional) Select Category</option>
    <option>General</option>
    <option>Trading</option>
    <option>Support</option>
    <option>Off-Topic</option>
</select>
<br>
<button onclick="saveThread()">Post Thread</button>
<hr>

<h3>Search Forums</h3>
<input id="keywordSearch" placeholder="Search keywords, users, or categories...">
<button onclick="lookupKeywords()">Search</button>
<div id="lookupResults"></div>

<hr>

<h3>Recent Discussions</h3>
<div id="searchList"></div>
<div id="paginationControls" style="margin-top: 10px; text-align: center;">
    <button id="prevPage" onclick="changePage(-1)">Previous</button>
    <span id="pageDisplay" style="margin: 0 15px;">Page 1</span>
    <button id="nextPage" onclick="changePage(1)">Next</button>
</div>
<hr>

<h3>My Threads</h3>
<div id="inboxList"></div>

<hr>

<div id="chatWindow" style="display:none;">
    <h3 id="chatTitle"></h3>
    <div id="chatMessages"></div>
    <textarea id="chatInput" placeholder="Write a reply..." style="width: 100%; height: 60px;"></textarea>
    <br>
    <button onclick="sendMessage()">Post Reply</button>
    <button onclick="closeChat()">Close Thread</button>
</div>

</div>
</div>

<div style="text-align: center; padding-bottom: 20px;">
    <button id="resetBtn" onclick="resetAllData()" style="background:#ed4245; display:none;">RESET DATABASE</button>
    <button onclick="requestNotificationPermission()">Enable Desktop Alerts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXAMTPkmQx4KLydLsEUPPnrI748Exd4Hw",
  authDomain: "seymourbase-a1ad6.firebaseapp.com",
  databaseURL: "https://seymourbase-a1ad6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seymourbase-a1ad6",
  storageBucket: "seymourbase-a1ad6.firebasestorage.app",
  messagingSenderId: "586609389090",
  appId: "1:586609389090:web:e3bdcc9b3107917818a47b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let mode = "login";
let activeChatId = null;
let currentPage = 1;
const entriesPerPage = 10;
let totalSearches = []; 

// --- AUTH ---
window.switchToCreate = () => { mode = "create"; document.getElementById("errorMsg").textContent = "Mode: Create Account"; };

window.submitLogin = async function() {
    const user = document.getElementById("usernameInput").value.trim();
    const pass = document.getElementById("passwordInput").value.trim();
    if(!user || !pass) return;
    const fakeEmail = `${user.toLowerCase()}@seymour.base`;
    try {
        if (mode === "create") await createUserWithEmailAndPassword(auth, fakeEmail, pass);
        else await signInWithEmailAndPassword(auth, fakeEmail, pass);
    } catch (e) { document.getElementById("errorMsg").textContent = "Error: " + e.message; }
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        const username = user.email.split('@')[0];
        localStorage.setItem("currentUser", username);
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";
        if(username.toLowerCase() === "infinitypixel") document.getElementById("resetBtn").style.display = "inline-block";
        startGlobalSync(username);
    } else {
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("appSection").style.display = "none";
    }
});

// --- DATA SYNC ---
function startGlobalSync(currentUser) {
    onValue(ref(db, 'threads'), (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            document.getElementById("searchList").innerHTML = "No threads yet.";
            return;
        }
        totalSearches = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
        renderPaginatedList(currentUser);
        
        // My Threads
        const inbox = document.getElementById("inboxList");
        inbox.innerHTML = "";
        totalSearches.filter(e => e.user === currentUser).forEach(entry => {
            const div = document.createElement("div");
            div.className = "inbox-entry";
            div.textContent = `${entry.title} [${entry.category || 'General'}]`;
            div.onclick = () => window.openChat(entry.id, entry.title);
            inbox.appendChild(div);
        });
    });
}

function renderPaginatedList(currentUser) {
    const list = document.getElementById("searchList");
    list.innerHTML = "";
    const pageItems = totalSearches.slice((currentPage-1)*entriesPerPage, currentPage*entriesPerPage);

    pageItems.forEach(entry => {
        const lastViewed = localStorage.getItem(`lastViewed_${entry.id}`) || 0;
        const hasUnread = entry.lastActivity && entry.lastActivity > lastViewed;
        
        const div = document.createElement("div");
        div.className = "search-entry";
        div.innerHTML = `
            <div>
                ${hasUnread ? '<span style="color:#ed4245">● </span>' : ''}
                <strong>${entry.title}</strong> <small>by ${entry.user} (${entry.category || 'General'})</small>
            </div>
        `;
        
        const btnContainer = document.createElement("div");
        if(currentUser.toLowerCase() === "infinitypixel") {
            const del = document.createElement("button");
            del.textContent = "Delete";
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, `threads/${entry.id}`)); };
            btnContainer.appendChild(del);
        }
        div.appendChild(btnContainer);
        div.onclick = () => window.openChat(entry.id, entry.title);
        list.appendChild(div);
    });

    document.getElementById("pageDisplay").textContent = `Page ${currentPage}`;
    document.getElementById("prevPage").disabled = (currentPage === 1);
    document.getElementById("nextPage").disabled = (currentPage * entriesPerPage >= totalSearches.length);
}

window.changePage = (dir) => { currentPage += dir; renderPaginatedList(localStorage.getItem("currentUser")); };

// --- FORUM ACTIONS ---
window.saveThread = function() {
    const title = document.getElementById("threadTitle").value.trim();
    const category = document.getElementById("categorySelect").value;
    const user = localStorage.getItem("currentUser");
    if(title) {
        push(ref(db, 'threads'), { user, title, category, lastActivity: Date.now() });
        document.getElementById("threadTitle").value = "";
    }
};

window.lookupKeywords = function() {
    const query = document.getElementById("keywordSearch").value.toLowerCase().trim();
    const resultsDiv = document.getElementById("lookupResults");
    resultsDiv.innerHTML = "";
    if(!query) return;

    totalSearches.forEach(entry => {
        const inTitle = entry.title.toLowerCase().includes(query);
        const inCat = (entry.category || "").toLowerCase().includes(query);
        const inUser = entry.user.toLowerCase().includes(query);

        if(inTitle || inCat || inUser) {
            const res = document.createElement("div");
            res.className = "search-entry";
            res.innerHTML = `<strong>${entry.title}</strong> — ${entry.user} [${entry.category || 'General'}]`;
            res.onclick = () => window.openChat(entry.id, entry.title);
            resultsDiv.appendChild(res);
        }
    });
};

// --- MESSAGING ---
window.openChat = function(id, title) {
    activeChatId = id;
    document.getElementById("chatWindow").style.display = "block";
    document.getElementById("chatTitle").textContent = title;
    localStorage.setItem(`lastViewed_${id}`, Date.now());
    
    const msgDiv = document.getElementById("chatMessages");
    let isFirstLoad = true;

    onValue(ref(db, `messages/${id}`), (snapshot) => {
        msgDiv.innerHTML = "";
        const msgs = snapshot.val();
        if(msgs) {
            const msgsArray = Object.values(msgs);
            msgsArray.forEach(m => {
                const d = document.createElement("div");
                d.className = "msg-line";
                d.innerHTML = `<span class="msg-user">${m.user}:</span> ${m.text}`;
                msgDiv.appendChild(d);
            });
            if(!isFirstLoad && msgsArray[msgsArray.length-1].user !== localStorage.getItem("currentUser")) {
                showNotification(title, msgsArray[msgsArray.length-1].user, msgsArray[msgsArray.length-1].text);
            }
        }
        isFirstLoad = false;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });
};

window.sendMessage = function() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text || !activeChatId) return;
    const currentUser = localStorage.getItem("currentUser");

    push(ref(db, `messages/${activeChatId}`), { user: currentUser, text: text, timestamp: Date.now() });
    set(ref(db, `threads/${activeChatId}/lastActivity`), Date.now());
    input.value = "";
};

window.closeChat = () => document.getElementById("chatWindow").style.display = "none";

window.resetAllData = () => { if(confirm("Clear all forum data?")) set(ref(db, '/'), null); };

// --- NOTIFICATIONS ---
window.requestNotificationPermission = () => {
    if ("Notification" in window) Notification.requestPermission();
};

function showNotification(title, user, text) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(`New Reply in ${title}`, { body: `${user}: ${text}` });
    }
}
</script>
</body>
</html>
